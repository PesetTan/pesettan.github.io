<form>
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput [formControl]="guest.controls.name" />
  </mat-form-field>

  <mat-chip-listbox>
    <mat-chip-option>Additional Guest</mat-chip-option>
  </mat-chip-listbox>

  <div class="flex place-content-center p-6">
    <button mat-raised-button 
      color="primary" 
      [disabled]="guest.invalid" 
      [mat-dialog-close]="guest">Confirm</button>
  </div>

</form>
